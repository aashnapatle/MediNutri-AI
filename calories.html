<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediNutri AI+ Calories</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0ea5e9,#2563eb,#1e3a8a);
    color:white;
}

.navbar{
    background:#0f172a;
    padding:18px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.menu{
    text-align:center;
    padding:15px;
    background:#1e40af;
}

.menu a{
    color:white;
    text-decoration:none;
    margin:15px;
    font-weight:bold;
}

.container{
    width:430px;
    margin:40px auto;
    background:white;
    color:#111827;
    padding:35px;
    border-radius:25px;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#1e3a8a;
}

input,select{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:2px solid #cbd5e1;
    border-radius:12px;
    font-size:15px;
    color:black;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:#2563eb;
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.result{
    margin-top:25px;
    padding:20px;
    border-radius:18px;
    text-align:center;
    background:#dbeafe;
}

#calories{
    font-size:32px;
    color:#1e3a8a;
    font-weight:bold;
}

#suggestion{
    color:#111827;
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="navbar">🔥 MediNutri AI+ Calories</div>

<div class="menu">
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="calories.html">Calories</a>
<a href="doctors.html">Doctors</a>
</div>

<div class="container">

<h2>Daily Calories Calculator</h2>

<input type="number" id="age" placeholder="Enter Age">

<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<input type="number" id="weight" placeholder="Enter Weight (kg)">

<select id="activity">
<option value="25">Low Activity</option>
<option value="30">Moderate Activity</option>
<option value="35">High Activity</option>
</select>

<button onclick="calculateCalories()">Calculate Calories</button>

<div class="result">
<h3 id="calories">0 kcal</h3>
<p id="suggestion">Your health suggestion will appear here</p>
</div>

</div>

<script>
function calculateCalories(){
    let weight=document.getElementById("weight").value;
    let gender=document.getElementById("gender").value;
    let activity=document.getElementById("activity").value;

    if(weight==""){
        alert("Enter weight");
        return;
    }

    let calories=weight*activity;

    if(gender==="female"){
        calories-=200;
    }

    document.getElementById("calories").innerText=calories+" kcal";

    let tip="";

    if(calories<1800){
        tip="🥗 Eat more healthy meals";
    }
    else if(calories<2500){
        tip="💪 Great balance! Maintain this diet";
    }
    else{
        tip="⚠️ Reduce junk food + exercise daily";
    }

    document.getElementById("suggestion").innerText=tip;
}
</script>

</body>
</html>
